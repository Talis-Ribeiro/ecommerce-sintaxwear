<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="./css/reset.css" />
  <link rel="stylesheet" href="./css/variables.css">
  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/components/header.css">
  <link rel="stylesheet" href="./css/components/hero.css">
  <link rel="stylesheet" href="./css/components/product-category.css">
  <title>SyntaxWear - Tênis e Sneakers Online</title>

  <meta name="description"
    content="Descubra a SyntaxWear, sua loja online de tênis e sneakers. Encontre os melhores estilos, lançamentos exclusivos e promoções imperdíveis. Compre agora e eleve seu estilo com nossos calçados de alta qualidade.">
</head>

<body>
  <header class="header">
    <h1 class="logo">
      <a href="/">
        <img src="./images/logo/Logo.svg" alt="SyntaxWear">
      </a>
    </h1>
    <!-- <nav class="top-nav"> analisar para usar ou não usar -->
    <ul class="nav-center">
      <li><a href="#">Masculino</a></li>
      <li><a href="#">Feminino</a></li>
      <li><a href="#">Outlet</a></li>
    </ul>
    <ul class="nav-center nav-right">
      <li><a href="#">Nossas lojas</a></li>
      <li><a href="#">Sobre</a></li>
      <li><a href="#"><img src="./images/icons/user.svg" alt=""></a></li>
      <li><a href="#"><img src="./images/icons/help.svg.svg" alt=""></a></li>
      <li><a href="#"> <img src="./images/icons/bag.svg.svg" alt=""></a></li>
    </ul>
    <!-- </nav> -->
  </header>

  <nav class="main-nav">
    <!-- menu principal e links de categorias -->
  </nav>

  <main class="page-main">
    <section class="hero-section">
      <!-- área de destaque com campanha e lançamentos -->
      <div class="hero-overlay">

        <div class="hero-content">
          <span class="hero-title">Krypton One</span>
          <h2 class="hero-subtitle">Transforme qualquer passo<br>em presença.</h2>

          <div class="hero-buttons">
            <a class="btn btn-outline" href="#">Ver modelos</a>
            <a class="btn btn-filled" href="#">Comprar</a>

          </div>
        </div>
      </div>
    </section>

    <section class="categories-section">
      <!-- grade de opções de tênis e estilos -->


        <div class="category-card btn casual">
          <a href="#" class="category-link btn">
            <span class="overlay"></span>
            <span class="category-name">Casual</span>
          </a>
        </div>
         <div class="category-card btn esportivo">
          <a href="#" class="category-link btn">
            <span class="overlay"></span>
            <span class="category-name">Esportivo</span>
          </a>
        </div>
           <div class="category-card btn moderno moderno">
          <a href="#" class="category-link btn">
            <span class="overlay"></span>
            <span class="category-name">Moderno</span>
          </a>
        </div>
           <div class="category-card btn futurista">
          <a href="#" class="category-link btn">
            <span class="overlay"></span>
            <span class="category-name">Futurista</span>
          </a>
        </div>



    </section>

    <section class="style-guide-section">
      <!-- categorias de estilo e filtros de tendência -->
    </section>

    <section class="promo-section">
      <!-- promoções, ofertas e coleções em destaque -->
    </section>

    <section class="newsletter-section">
      <!-- cadastro de newsletter e novidades -->
    </section>
  </main>

  <aside class="sidebar">
    <!-- conteúdo secundário, filtros ou links rápidos -->
  </aside>

  <footer class="site-footer">
    <!-- informações de rodapé e links institucionais -->
  </footer>
</body>

</html>
